# =============================================================================
# Vendetta Chess Motor — local Cargo configuration
#
# target-cpu=native: allows the compiler to use ALL instructions of the
# COMPILING processor (here an Apple M2 Pro, aarch64), instead of sticking
# to the guaranteed-portable base subset of aarch64. A chess engine benefits
# from specialized bitwise instructions (popcount, count-leading-zeros,
# etc.) called billions of times per second — hence a gain in NPS.
#
# Pure SPEED: no change in search results, so zero Elo lost.
#
# ⚠️ Portability: the resulting binary is NO LONGER guaranteed to run on an
# older or different processor than the one that compiled it. This doesn't
# matter for a local build used on the same machine. To produce a
# distributable binary (GitHub release), compile WITHOUT this file (or
# temporarily remove it), to target the portable aarch64 subset.
# =============================================================================

[build]
rustflags = ["-C", "target-cpu=native"]