[package]
name = "vendetta-chess-engine"
version = "1.1.2"
edition = "2021"
authors = ["Fabrice Garcia"]
description = "Professional chess engine in Rust - 100% UCI compatible"
license = "MIT"
readme = "README.md"
repository = "https://github.com/Fab2bprog/Rust-Vendetta-Chess-Motor"
keywords = ["chess", "chess-engine", "uci", "alpha-beta", "bitboard"]
categories = ["games", "algorithms", "command-line-utilities"]
exclude = [
    ".cargo/",
    ".DS_Store",
    "src/.DS_Store",
    "*.tar.gz",
]

# No external dependencies for the base engine.
# Project philosophy: stability and correctness before performance.
[dependencies]

[[bin]]
name = "vendetta-chess-engine"
path = "src/main.rs"

[[bin]]
name = "perft"
path = "src/bin/perft.rs"

[[bin]]
name = "benchmark"
path = "src/bin/benchmark.rs"

[[bin]]
name = "extract_positions"
path = "src/bin/extract_positions.rs"

[[bin]]
name = "tuner"
path = "src/bin/tuner.rs"

[[bin]]
name = "selfplay"
path = "src/bin/selfplay.rs"

[profile.release]
opt-level = 3
# Link-Time Optimization: cross-module optimization at link time.
# Enables inlining and pruning across crates/modules that per-unit codegen
# can't see. Typical gain measured on a chess engine: +5 to +15% NPS.
# No impact on LOGIC (identical search results) — so zero Elo lost,
# and even an Elo gain at fixed time (deeper search).
lto = true
# A single codegen unit: the compiler optimizes the whole crate as one block
# (at the cost of slower compilation). Combines with LTO for the best
# possible code. Again, pure speed, zero change in behavior.
codegen-units = 1
# Note: `panic = "abort"` would provide a small additional gain (removing
# unwind "landing pads"), but it is deliberately OMITTED here because it
# interferes with `cargo test` (the test harness needs stack unwinding)
# and with the diagnostic `panic!` in magic.rs. The gain doesn't justify that risk.
